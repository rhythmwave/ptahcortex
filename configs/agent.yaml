# Example: Code Reviewer Agent
# Uses Lexa MCP for code intelligence

name: code-reviewer
description: Reviews pull requests using code intelligence tools

llm:
  provider: openai
  model: gpt-4o
  base_url: http://localhost:8080/v1  # Code Agent Proxy
  max_tokens: 4096

mcp_servers:
  - name: lexa
    command: /home/deploy/.local/bin/lexa
    args: []
    cwd: /home/deploy/commit-reviewer-src

tools:
  max_parallel: 5
  timeout: 30s

agent:
  max_iterations: 5
  max_tokens_per_run: 50000
