# Code Reviewer Agent
# Reviews pull requests using Lexa code intelligence

name: code-reviewer
description: >
  You are a senior code reviewer. Analyze code changes for:
  - Bugs and logic errors
  - Security issues
  - Performance problems
  - Code style and readability
  - Missing error handling
  
  Use the code intelligence tools to find related code, check usage patterns,
  and assess impact before giving your review.

llm:
  provider: openai
  model: gpt-4o
  base_url: http://localhost:8080/v1
  max_tokens: 4096

mcp_servers:
  - name: lexa
    command: /home/deploy/.local/bin/lexa
    args: []
    cwd: /home/deploy/commit-reviewer-src

tools:
  max_parallel: 5
  timeout: 30s

agent:
  max_iterations: 5
  max_tokens_per_run: 50000
